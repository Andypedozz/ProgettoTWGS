<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>Elaborazione OpenData</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>

  </head>

  <body>

    <h1>Temperature a Milano, 2018</h1>

    <canvas id="myChart" width="400" height="200"></canvas>

    <script>

      window.addEventListener('load', setupMilano);

      async function setupMilano() {

        const ctx = document.getElementById('myChart').getContext('2d');

        const lamTime = await getDataMilano();

        const myChart = new Chart(ctx, {

          type: 'line',

          data: {

            labels: lamTime.lambratedatetime,

            datasets: [

              {

                label: 'Temperature in °C',

                data: lamTime.lambratetemps,

                fill: false,

                borderColor: 'rgba(255, 99, 132, 1)',

                backgroundColor: 'rgba(255, 99, 132, 0.5)',

                borderWidth: 1

              }

            ]

          },

          options: {}

        });

      }

      async function getDataMilano() {

        const response = await fetch('/datamilanocsv');

        const data = await response.text();

        //console.log(data);

        const zones = []; // 6 zones

        const datehours = []; // 24h/day

        const temps = []; // 24 temps/day/zone

        const rows = data.split('\n');//.slice(1);

        rows.forEach(row => {

          const cols = row.split(';');

          //console.log(cols[0]);

          zones.push(cols[0]);

          //console.log(cols[2]);

          datehours.push(cols[2]);

          //console.log(cols[3]);

          temps.push(parseFloat(cols[3]));

        });

        

        const lambratedatetime = [];

        const lambratetemps = [];

        for (let i = 1; i < datehours.length; i +=6) {

          lambratedatetime.push(datehours[i]);

          console.log(datehours[i]);

          lambratetemps.push(temps[i]);

          console.log(temps[i]);

        }

        return { lambratedatetime, lambratetemps }; // X, Y

      }

    </script>

  </body>

</html>
